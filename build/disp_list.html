  <script>
    document.getElementById("myBack").addEventListener("click", () => {
      window.history.back();
    });

    document.addEventListener("DOMContentLoaded", () => {
      // BACK ARROW FADE IN
      const backAr = document.getElementById('backar');
      if (backAr) {
        setTimeout(() => { backAr.style.opacity = '0.8'; }, 100);
      }

      // TC FACE FADE IN (Same protocol as backar)
      const tcFace = document.getElementById('tc-face');
      if (tcFace) {
        setTimeout(() => { tcFace.style.opacity = '0.8'; }, 100);
      }

      // DI AND ARROW CROSSFADE LOGIC
      function setupDiCrossfade() {
        const v1 = document.getElementById('di-vid-1');
        const v2 = document.getElementById('di-vid-2');
        if (!v1 || !v2) return;

        let activeV = v1;
        let nextV = v2;
        let isFading = false;

        function checkDiCrossfade() {
          if (activeV && activeV.duration && !isFading) {
            // Trigger fade at 6.5s 
            if (activeV.currentTime >= 6.5) {
              isFading = true;

              nextV.style.transition = 'none';
              nextV.currentTime = 0;
              nextV.play().then(() => {
                setTimeout(() => {
                  activeV.style.transition = 'opacity 4.5s ease-in-out';
                  nextV.style.transition = 'opacity 4.5s ease-in-out';

                  activeV.style.opacity = '0';
                  nextV.style.opacity = '1';

                  // Swap refs
                  let oldActive = activeV;
                  activeV = nextV;
                  nextV = oldActive;

                  setTimeout(() => {
                    isFading = false;
                  }, 4500);
                }, 50);
              }).catch(e => console.log(e));
            }
          }
          requestAnimationFrame(checkDiCrossfade);
        }
        requestAnimationFrame(checkDiCrossfade);
      }
      setupDiCrossfade();

      // MOON SEP FADE IN (2.8s)
      const topSep = document.getElementById('top-sep');
      if (topSep) {
        setTimeout(() => { topSep.style.opacity = '1'; }, 100);
      }

      // HEART VIDEOS LOGIC
      const hearts = document.querySelectorAll('.hearts');
      hearts.forEach((video, index) => {
        // Loop to 5s
        video.addEventListener('ended', () => {
          video.currentTime = 5;
          video.play();
        });

        // Stagger start: 0s, 1s, 2s, 3s
        setTimeout(() => {
          video.play();
        }, index * 1000);
      });

      // --- UNIFIED CANDLE WAVE (Side, Corner & Adjacent) ---
      // Order: Left side -> TL corner -> TL adj -> BL corner -> BL adj -> BR corner -> BR adj -> TR corner -> TR adj -> Right side
      const c1 = document.getElementById('candle-left');
      const c2 = document.querySelector('.corner-candle.left');
      const c2a = document.querySelector('.corner-candle-adjacent.left-adj');
      const c3 = document.querySelector('.corner-candle.bottom-left');
      const c3a = document.querySelector('.corner-candle-adjacent.bottom-left-adj');
      const c4 = document.querySelector('.corner-candle.bottom-right');
      const c4a = document.querySelector('.corner-candle-adjacent.bottom-right-adj');
      const c5 = document.querySelector('.corner-candle.right');
      const c5a = document.querySelector('.corner-candle-adjacent.right-adj');
      const c6 = document.getElementById('candle-right');
      const waveCandles = [c1, c2, c2a, c3, c3a, c4, c4a, c5, c5a, c6];

      function runCandleWave() {
        console.log("Candle Wave: Initial Batch Fade In");

        // Initial: Batch Fade In (Simultaneous)
        waveCandles.forEach(c => { if (c) { c.classList.remove('rise-out'); c.classList.add('fade-in'); } });

        // Initial Hold: 10s (Fade) + 60s (Hold) = 70s
        setTimeout(startWaveLoop, 70000);
      }

      function startWaveLoop() {
        console.log("Candle Wave: Starting Loop (Rise Out)");

        // 1. Staggered Rise Out (Left to Right)
        waveCandles.forEach((c, i) => {
          if (c) {
            setTimeout(() => {
              c.classList.remove('fade-in');
              c.classList.add('rise-out');
            }, i * 1500);
          }
        });

        // Last Rise Finishes: (9 * 1500) + 10000 = 23500ms
        const riseFinishTime = 23500;

        // 2. Gap (0.5s) after Rise Finish
        setTimeout(() => {
          console.log("Candle Wave: Gap (0.5s) -> Reset");
          // Reset
          waveCandles.forEach(c => { if (c) c.classList.remove('rise-out'); });

          // 3. Staggered Fade In (Left to Right)
          setTimeout(() => {
            console.log("Candle Wave: Staggered Fade In");

            waveCandles.forEach((c, i) => {
              if (c) {
                setTimeout(() => {
                  c.classList.add('fade-in');
                }, i * 1500);
              }
            });

            // Last Fade Finishes: (9 * 1500) + 10000 = 23500ms
            // 4. Hold (60s)
            setTimeout(() => {
              console.log("Candle Wave: Holding (60s) -> Restart");
              startWaveLoop();
            }, 23500 + 60000); // 23.5s (Fade Seq) + 60s (Hold)

          }, 500); // 0.5s gap

        }, riseFinishTime);
      }

      // Start
      runCandleWave();
    });
  </script>

  <script>
    const dispersals = [

        title: "Solar Secondary",
        link: "Ledger/dispersals/SDisp1.html",
        tags: ["S", "1"],
        name: "-T.C",
        color: "#F5EAFF"
      }
    ];

    // ===== PAGINATION & FILTER STATE =====
    const itemsPerPage = 9;
    let currentPage = 1;
    let filteredDispersals = [...dispersals];

    // ===== ELEMENTS =====
    const grid = document.getElementById("maincont");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const numbox = document.getElementById("numbox");
    const totalPagesSpan = document.getElementById("totalPages");
    const goBtn = document.getElementById("gobtn");
    const bottomPageNumber = document.getElementById("page-num-text");
    const countDisplay = document.getElementById("count");
    const sortSelect = document.getElementById("sortOrder");
    const filterCheckboxes = document.querySelectorAll(".tag-filter");

    // ===== CREATE ITEM =====
    function createDispersalItem(d) {
      const item = document.createElement("a");
      item.href = d.link;
      item.className = "itemcon";

      item.innerHTML = `
    <div class="image">
      <img src="${d.image}" class="ethereal-glow-img" style="width:100%; height:auto;">
    </div>
    <div class="date ethereal-glow-txt">${d.date}</div>
    <div class="title ethereal-glow-txt">${d.title}</div>
    <div class="name ethereal-glow-txt" style="color: ${d.color}">${d.name}</div>
  `;

      return item;
    }

    function addDivider() {
      const div = document.createElement("img");
      div.src = "Images/smalldiv.png";
      div.className = "divider";
      grid.appendChild(div);
    }

    // ===== UPDATE COUNT =====
    function updateCount() {
      // Always show total count
      countDisplay.textContent = dispersals.length;
    }

    // ===== PARSE DATEHELPER =====
    function parseDate(dateStr) {
      // Expecting MM/DD/YY
      const parts = dateStr.split('/');
      if (parts.length === 3) {
        let year = parseInt(parts[2], 10);
        // Assume 20xx for 2-digit years
        year += 2000;
        const month = parseInt(parts[0], 10) - 1; // JS months are 0-11
        const day = parseInt(parts[1], 10);
        return new Date(year, month, day);
      }
      return new Date(0); // Fallback
    }

    // ===== FILTER & SORT LOGIC =====
    // ===== FILTER & SORT LOGIC =====
    function handleCheckboxChange(e) {
      const checkbox = e.target;
      const groupRow = checkbox.closest('.filter-row');

      // Enforce mutual exclusivity within the group
      if (checkbox.checked && groupRow) {
        const siblings = groupRow.querySelectorAll('.tag-filter');
        siblings.forEach(cb => {
          if (cb !== checkbox) cb.checked = false;
        });
      }

      applyFilters();
    }

    function applyFilters() {
      // 1. Get selected tags for each group
      const group1Row = document.querySelector('.filter-row[data-group="1"]');
      const group2Row = document.querySelector('.filter-row[data-group="2"]');

      const group1Val = group1Row ? Array.from(group1Row.querySelectorAll('.tag-filter:checked')).map(cb => cb.value)[0] : null;
      const group2Val = group2Row ? Array.from(group2Row.querySelectorAll('.tag-filter:checked')).map(cb => cb.value)[0] : null;

      filteredDispersals = dispersals.filter(item => {
        if (!item.tags) return false;

        // Logic: (Match Group 1 OR No Group 1 Selected) AND (Match Group 2 OR No Group 2 Selected)
        const matchGroup1 = !group1Val || item.tags.includes(group1Val);
        const matchGroup2 = !group2Val || item.tags.includes(group2Val);

        return matchGroup1 && matchGroup2;
      });

      // 2. Sort
      const sortValue = sortSelect.value;
      filteredDispersals.sort((a, b) => {
        const dateA = parseDate(a.date);
        const dateB = parseDate(b.date);
        if (sortValue === 'newest') {
          return dateB - dateA; // Descending
        } else {
          return dateA - dateB; // Ascending
        }
      });

      // 3. Reset to Page 1 and Render
      currentPage = 1;
      updateCount();
      renderPage(currentPage);
    }

    // ===== RENDER PAGE =====
    function renderPage(page) {
      grid.innerHTML = "";

      // Safety check for empty results
      if (filteredDispersals.length === 0) {
        grid.innerHTML = "<div style='grid-column: 1 / -1; text-align: center; margin-top: 2rem;'>No results found.</div>";
        updatePaginationUI();
        return;
      }

      const start = (page - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageItems = filteredDispersals.slice(start, end);

      pageItems.forEach((d, i) => {
        grid.appendChild(createDispersalItem(d));

        /* if ((i + 1) % 3 === 0 && i !== pageItems.length - 1) {
          addDivider();
        } */
      });

      updatePaginationUI();
    }

    // ===== UPDATE PAGINATION UI =====
    function updatePaginationUI() {
      const totalPages = Math.ceil(filteredDispersals.length / itemsPerPage);
      // Ensure totalPages is at least 1 to avoid 0/0 issues if empty
      const SafeTotalPages = totalPages < 1 ? 1 : totalPages;

      numbox.value = currentPage;
      bottomPageNumber.textContent = currentPage;

      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage >= SafeTotalPages; // Use >= to be safe
    }

    // ===== NAVIGATION =====
    prevBtn.addEventListener("click", () => {
      if (currentPage > 1) {
        currentPage--;
        renderPage(currentPage);
      }
    });

    nextBtn.addEventListener("click", () => {
      const totalPages = Math.ceil(filteredDispersals.length / itemsPerPage);
      if (currentPage < totalPages) {
        currentPage++;
        renderPage(currentPage);
      }
    });

    goBtn.addEventListener("click", () => {
      const totalPages = Math.ceil(filteredDispersals.length / itemsPerPage);
      let value = parseInt(numbox.value);

      if (isNaN(value)) value = 1;
      if (value < 1) value = 1;
      if (value > totalPages) value = totalPages;

      currentPage = value;
      renderPage(currentPage);
    });

    // Allow Enter key in input
    numbox.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        goBtn.click();
      }
    });

    // ===== EVENT LISTENERS FOR FILTERS =====
    sortSelect.addEventListener("change", applyFilters);
    filterCheckboxes.forEach(cb => {
      cb.addEventListener("change", handleCheckboxChange);
    });

    // ===== INITIAL LOAD =====
    applyFilters(); // This will sort and render initial state
    // ===== DISP LOOP LOGIC =====
    const LOOP_DURATION = 1.0; // 1 second loop for everything

    function checkDispLoop() {
      const videos = document.querySelectorAll(".disp-loop");
      videos.forEach(v => {
        if (v.currentTime >= LOOP_DURATION) {
          v.currentTime = 0;
          v.play().catch(() => { }); // Ignore play errors
        }
      });
      requestAnimationFrame(checkDispLoop);
    }
    requestAnimationFrame(checkDispLoop);
  </script>

</body>
