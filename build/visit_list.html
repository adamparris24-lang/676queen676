<!doctype html>
<html>

<head>
  <link href="css/disp_list/disp_list.css" rel="stylesheet" type="text/css">
  <style>
    #maincont {
      grid-template-columns: 1fr !important;
      padding: 0 2% !important;
      gap: 4rem !important;
		width:80%
    }

    .itemcon {
      flex-direction: row !important;
      height: 85% !important;
      justify-content: flex-start !important;
      align-items: center !important;
      text-align: left !important;
      padding: 0 !important;
      overflow: hidden;
      gap: 0 !important;
      cursor: default;
    }

    .itemcon:hover {
      transform: translateY(-3px) !important;
    }

    .img-wrapper {
      width: 45%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding: 1.2rem;
      box-sizing: border-box;
    }

    .img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover !important;
      pointer-events: auto;
      border-radius: 8px;
      filter: sepia(0.2) contrast(1.1) brightness(0.9);
      cursor: pointer;
    }

    .title-wrapper {
      width: 55%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 2rem;
    }

    @keyframes titleGlowPulse {

      0%,
      100% {
        text-shadow: 0 0 15px rgba(255, 200, 255, 0.5), 0 0 30px rgba(200, 100, 255, 0.3);
        transform: scale(1);
        color: #ffffff;
      }

      50% {
        text-shadow: 0 0 25px rgba(255, 180, 255, 0.8), 0 0 50px rgba(180, 80, 255, 0.5);
        transform: scale(1.03);
        color: #ffeaff;
      }
    }

    .title-glow {
      animation: titleGlowPulse 5s ease-in-out infinite, opacityPulse 17.25s ease-in-out infinite;
    }

    .rgc {
      color: #F8F8F8;
    }

    .disp-title {
      font-style: italic;
      font-size: clamp(1.5rem, 4vw, 3.2rem);
      margin: 0;
    }

    /* Force Header Text Normalization */
    .header-text {
      position: static !important;
      transform: none !important;
      padding: 0 !important;
      opacity: 1 !important;
      animation: etherealPulseTxt 5.75s ease-in-out infinite !important;
      font-size: clamp(1.1rem, 5vw, 1.8rem) !important;
    }

    /* Magnifier Modal Styles */
    #photo-modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.95);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #photo-modal-content {
      margin: auto;
      display: block;
      max-width: 95%;
      max-height: 90%;
      object-fit: contain;
      border-radius: 5px;
      box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: crosshair;
    }


    #photo-modal-close {
      position: absolute;
      top: 20px;
      right: 35px;
      color: #f1f1f1;
      font-size: 4rem;
      font-weight: bold;
      transition: 0.3s;
      cursor: pointer;
      user-select: none;
    }

    .disp-snow {
      height: 3.5vh;
      width: auto;
      opacity: 0.8;
      mix-blend-mode: screen;
      filter: saturate(0.3) blur(1px);
    }

    @keyframes subtlePulse {

      0%,
      66.6%,
      100% {
        opacity: 0.6;
        filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.2));
      }

      33.3% {
        opacity: 0.9;
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.6));
      }
    }

    .running-count-pulse {
      animation: subtlePulse 9s ease-in-out infinite;
    }

    video:not(.di-vid) {
      filter: hue-rotate(200deg) saturate(0.5);
    }

    .coordinate-link {
      color: #a0c4ff !important;
      text-decoration: underline !important;
      opacity: 0.8 !important;
      transition: opacity 0.3s;
    }

    .coordinate-link:hover {
      opacity: 1 !important;
    }
  </style>
</head>

  <script>
    const dispersals = [
      { image: "https://captainscurses.org/Images/visit1.jpg", date: "February 23, 2026", title: "Shining Totem", coords: "40.468276, -122.273870" }
		
    ];

    const itemsPerPage = 3;
    let currentPage = 1;
    let filteredDispersals = [...dispersals];

    const grid = document.getElementById("maincont");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const numbox = document.getElementById("numbox");
    const goBtn = document.getElementById("gobtn");
    const bottomPageNumber = document.getElementById("page-num-text");
    const countDisplay = document.getElementById("count");
    const sortSelect = document.getElementById("sortOrder");

    function createDispersalItem(d) {
      const item = document.createElement('div');
      item.className = 'itemcon';
      item.innerHTML = `
        <div class="img-wrapper">
          <img src="${d.image}" alt="${d.title}" class="inspection-trigger">
        </div>
        <div class="title-wrapper" style="flex-direction: column; align-items: flex-start; justify-content: center;">
          <p class="disp-title rgc title-glow">"${d.title}"</p>
          <p class="disp-author rgc" style="font-size: clamp(1rem, 3vw, 1.8rem); margin-top: 0.6rem; opacity: 0.8; font-family: 'CaslonAntique', serif;">-T.C</p>
          <p class="disp-date rgc" style="font-size: clamp(0.8rem, 2.5vw, 1.4rem); margin-top: 0.2rem; opacity: 0.6; font-family: 'CaslonAntique', serif;">${d.date}</p>
          ${d.coords ? `<a href="https://www.google.com/maps?q=${encodeURIComponent(d.coords)}" target="_blank" class="rgc coordinate-link" style="font-size: clamp(0.7rem, 2vw, 1.2rem); margin-top: 0.2rem; font-family: 'CaslonAntique', serif;">${d.coords}</a>` : ''}
        </div>
      `;
      item.querySelector('.inspection-trigger').onclick = function () { openModal(this.src); };
      return item;
    }

    function openModal(src) {
      const modal = document.getElementById("photo-modal");
      const modalImg = document.getElementById("photo-modal-content");
      modal.style.display = "flex";
      modalImg.src = src;
    }

    function renderPage(page) {
      grid.innerHTML = "";
      const start = (page - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageItems = filteredDispersals.slice(start, end);
      pageItems.forEach(d => grid.appendChild(createDispersalItem(d)));
      numbox.value = page;
      bottomPageNumber.textContent = page;
      // removed totalPagesSpan reference to prevent script crash
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === Math.ceil(filteredDispersals.length / itemsPerPage);
    }

    const locationCheckbox = document.getElementById("exactLocationFilter");

    function applyFilters() {
      filteredDispersals = dispersals.filter(d => {
        if (locationCheckbox.checked && !d.coords) return false;
        return true;
      });

      filteredDispersals.sort((a, b) => {
        const dateA = new Date(a.date);
        const dateB = new Date(b.date);
        return sortSelect.value === 'newest' ? dateB - dateA : dateA - dateB;
      });

      currentPage = 1;
      renderPage(1);
    }

    sortSelect.onchange = applyFilters;
    locationCheckbox.onchange = applyFilters;

    prevBtn.onclick = () => { if (currentPage > 1) renderPage(--currentPage); };
    nextBtn.onclick = () => { if (currentPage < Math.ceil(filteredDispersals.length / itemsPerPage)) renderPage(++currentPage); };
    goBtn.onclick = () => { let p = parseInt(numbox.value); if (p >= 1 && p <= Math.ceil(filteredDispersals.length / itemsPerPage)) { currentPage = p; renderPage(p); } };

    document.addEventListener("DOMContentLoaded", () => {
      countDisplay.textContent = dispersals.length;
      renderPage(1);

      document.getElementById("myBack").onclick = () => window.history.back();
      setTimeout(() => { document.getElementById('backar').style.opacity = '0.8'; }, 100);
      setTimeout(() => { document.getElementById('tc-face').style.opacity = '0.8'; }, 100);
      setTimeout(() => { document.getElementById('top-sep').style.opacity = '1'; }, 100);

      const modal = document.getElementById("photo-modal");
      const modalImg = document.getElementById("photo-modal-content");
      const closeBtn = document.getElementById("photo-modal-close");
      closeBtn.onclick = () => { modal.style.display = "none"; };
      modal.onclick = (e) => { if (e.target === modal) { modal.style.display = "none"; } };

      // Di Crossfade
      const v1 = document.getElementById('di-vid-1'), v2 = document.getElementById('di-vid-2');
      let activeV = v1, nextV = v2, isFading = false;
      function checkDi() {
        if (activeV && activeV.duration && !isFading && activeV.currentTime >= 6.5) {
          isFading = true; nextV.style.transition = 'none'; nextV.currentTime = 0;
          nextV.play().then(() => {
            setTimeout(() => {
              activeV.style.transition = nextV.style.transition = 'opacity 4.5s ease-in-out';
              activeV.style.opacity = '0'; nextV.style.opacity = '1';
              [activeV, nextV] = [nextV, activeV];
              setTimeout(() => isFading = false, 4500);
            }, 50);
          });
        }
        requestAnimationFrame(checkDi);
      }
      requestAnimationFrame(checkDi);
    });
  </script>
