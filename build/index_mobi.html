  <style>
    @keyframes ornamentBob {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-0.3rem);
      }
    }

    .bobbing {
      animation: ornamentBob 4s ease-in-out infinite;
    }

    .submit-ornament {
      height: 7rem;
      min-height: 80px;
      width: auto;
      opacity: 0.8;
      display: block;
      position: relative;
      z-index: -1;
      transform: translate(15%, 0%)
    }

    @keyframes treasureGlow {

      0%,
      100% {
        opacity: 0.6;
        text-shadow: 0 0 10px rgba(186, 163, 138, 0.4);
        filter: saturate(0.6);
      }

      50% {
        opacity: 0.95;
        text-shadow: 0 0 20px rgba(186, 163, 138, 0.9), 0 0 35px rgba(186, 163, 138, 0.5);
        filter: saturate(0.9);
      }
    }

    .subtitle-glow {
      animation: treasureGlow 5s ease-in-out infinite;
      color: #BAA38A;
      /* Desaturated gold */
      font-family: 'Caslon Antique', serif;
    }

    @keyframes subtlePulse {

      0%,
      66.6%,
      100% {
        opacity: 0.6;
        filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.2));
      }

      33.3% {
        opacity: 0.9;
        filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.6));
      }
    }

    .running-count-pulse {
      animation: subtlePulse 9s ease-in-out infinite;
    }

    .sub-text {
      text-align: center;
      font-size: 2.3rem;
      max-width: 80%;
      margin: 3rem auto 3rem auto;
      width: 75%;
    }

    @keyframes etherealPulseTxt {

      0%,
      100% {
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.32), 0 0 18px rgba(255, 255, 255, 0.16);
      }

      50% {
        text-shadow: 0 0 12px rgba(255, 255, 255, 0.45), 0 0 25px rgba(255, 255, 255, 0.25);
      }
    }

    @keyframes brightnessPulse {

      0%,
      100% {
        opacity: 0.87;
      }

      50% {
        opacity: 0.92;
      }
    }

    .ethereal-glow-txt {
      animation: etherealPulseTxt 5.75s ease-in-out infinite, brightnessPulse 10s ease-in-out infinite;
    }

    @keyframes gdOpacityPulse {

      0%,
      100% {
        opacity: 0.8;
      }

      50% {
        opacity: 1;
      }
    }

    .gd-block-pulse {
      animation: gdOpacityPulse 10s ease-in-out infinite;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @keyframes rainbowFadeSpecial {

      0%,
      100% {
        color: #ffffff;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
      }

      50% {
        color: hsl(var(--hue), 20%, 80%);
        text-shadow: 0 0 15px hsl(var(--hue), 40%, 60%);
      }
    }

    .rbw-letter {
      animation: rainbowFadeSpecial 6s ease-in-out infinite;
    }
  </style>

  <script>
    const tracks = [
      { name: "TC", title: "Bullfrog Ballpit", src: "https://captainscurses.org/Bullfrog%20Ballpit%202.wav" }
    ];

    const videos = [];

    // =======================
    // TRACK ELEMENTS
    // =======================
    let page = 0;
    const a1 = document.getElementById("a1");
    const a2 = document.getElementById("a2");
    const name1 = document.getElementById("name1");
    const name2 = document.getElementById("name2");
    const title1 = document.getElementById("title1");
    const title2 = document.getElementById("title2");
    const pagenum = document.getElementById("pagenum");
    const leftar = document.getElementById("leftar");
    const rightar = document.getElementById("rightar");
    const pageInput = document.getElementById("numbox");
    const gobtn = document.getElementById("gobtn");
    const totalPages = Math.ceil(tracks.length / 2);

    // =======================
    // VIDEO ELEMENTS
    // =======================
    let vpage = 0;
    const v1 = document.getElementById("v1");
    const v2 = document.getElementById("v2");
    const vname1 = document.getElementById("vname1");
    const vname2 = document.getElementById("vname2");
    const vtitle1 = document.getElementById("vtitle1");
    const vtitle2 = document.getElementById("vtitle2");
    const vpagenum = document.getElementById("vpagenum");
    const vleft = document.getElementById("vleft");
    const vright = document.getElementById("vright");
    const vinput = document.getElementById("vinput");
    const vgobtn = document.getElementById("vgobtn");
    const vtotalPages = Math.ceil(videos.length / 2);

    // =======================
    // TRACK FUNCTIONS
    // =======================
    function loadPage(p) {
      if (pagenum) pagenum.textContent = p + 1;
      if (pageInput) pageInput.value = p + 1;
      const t1 = tracks[p * 2];
      const t2 = tracks[p * 2 + 1];

      if (t1) {
        a1.src = t1.src;
        name1.textContent = t1.name;
        title1.textContent = `"${t1.title}"`;
      } else {
        a1.src = "";
        name1.textContent = "";
        title1.textContent = "";
      }

      if (t2) {
        a2.src = t2.src;
        name2.textContent = t2.name;
        title2.textContent = `"${t2.title}"`;
      } else {
        a2.src = "";
        name2.textContent = "";
        title2.textContent = "";
      }
    }

    rightar.onclick = () => {
      if ((page + 1) * 2 < tracks.length) {
        page++;
        loadPage(page);
      }
    };

    leftar.onclick = () => {
      if (page > 0) {
        page--;
        loadPage(page);
      }
    };

    gobtn.addEventListener("click", () => {
      let wantedPage = parseInt(pageInput.value) - 1;
      if (!isNaN(wantedPage) && wantedPage >= 0 && wantedPage < totalPages) {
        page = wantedPage;
        loadPage(page);
      }
      pageInput.value = "";
    });

    pageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") gobtn.click();
    });

    // =======================
    // VIDEO FUNCTIONS
    // =======================
    function loadVideoPage(p) {
      if (vpagenum) vpagenum.textContent = p + 1;
      if (vinput) vinput.value = p + 1;
      const vid1 = videos[p * 2];
      const vid2 = videos[p * 2 + 1];

      if (vid1) {
        v1.src = `https://www.youtube.com/embed/${vid1.youtube}`;
        vname1.textContent = vid1.name;
        vtitle1.textContent = `"${vid1.title}"`;
        v1.style.visibility = 'visible';
      } else {
        v1.src = "";
        vname1.textContent = "";
        vtitle1.textContent = "";
        v1.style.visibility = 'hidden';
      }

      if (vid2) {
        v2.src = `https://www.youtube.com/embed/${vid2.youtube}`;
        vname2.textContent = vid2.name;
        vtitle2.textContent = `"${vid2.title}"`;
        v2.style.visibility = 'visible';
      } else {
        v2.src = "";
        vname2.textContent = "";
        vtitle2.textContent = "";
        v2.style.visibility = 'hidden';
      }
    }

    vright.onclick = () => {
      if ((vpage + 1) * 2 < videos.length) {
        vpage++;
        loadVideoPage(vpage);
      }
    };

    vleft.onclick = () => {
      if (vpage > 0) {
        vpage--;
        loadVideoPage(vpage);
      }
    };

    vgobtn.addEventListener("click", () => {
      let wanted = parseInt(vinput.value) - 1;
      if (!isNaN(wanted) && wanted >= 0 && wanted < vtotalPages) {
        vpage = wanted;
        loadVideoPage(vpage);
      }
      vinput.value = "";
    });

    vinput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") vgobtn.click();
    });

    // =======================
    // INITIAL LOAD
    // =======================
    loadPage(page);
    loadVideoPage(vpage);

    // Set Music Count
    const musicTotalCount = document.getElementById("music-total-count");
    if (musicTotalCount) {
      musicTotalCount.textContent = tracks.length;
    }

    // Set Video Count
    const videoTotalCount = document.getElementById("video-total-count");
    if (videoTotalCount) {
      videoTotalCount.textContent = videos.length;
    }

    // ==========================================
    // SURGICAL CROSSFADE CONTROLLER (UNIFIED & PRE-BUFFERED)
    // ==========================================
    async function setupSurgicalSync(videoPairs, triggerOffset, fadeDurMs) {
      const groupA = videoPairs.map(p => p[0]);
      const groupB = videoPairs.map(p => p[1]);
      let activeGroup = groupA, nextGroup = groupB;
      let isFading = false;

      async function prepareAndPlay(group) {
        for (const v of group) {
          v.currentTime = 0;
          v.pause();
        }
        await new Promise(r => setTimeout(r, 100));
        return Promise.all(group.map(v => v.play()));
      }

      // Initial playback
      await prepareAndPlay(groupA);
      groupB.forEach(v => { v.style.opacity = '0'; v.pause(); });

      function checkLoop() {
        const master = activeGroup[0];
        if (master && master.duration && !isFading) {
          if (master.currentTime >= master.duration - (fadeDurMs / 1000 + triggerOffset)) {
            isFading = true;
            prepareAndPlay(nextGroup).then(() => {
              activeGroup.forEach(v => {
                v.style.transition = `opacity ${fadeDurMs}ms ease-in-out`;
                v.style.opacity = '0';
                v.classList.remove('active');
              });
              nextGroup.forEach(v => {
                v.style.transition = `opacity ${fadeDurMs}ms ease-in-out`;
                v.style.opacity = '1';
                v.classList.add('active');
              });

              const old = activeGroup;
              activeGroup = nextGroup;
              nextGroup = old;

              setTimeout(() => {
                old.forEach(v => {
                  v.pause();
                  v.style.transition = 'none';
                });
                isFading = false;
              }, fadeDurMs + 500);
            }).catch(e => {
              console.error("Sync Play Failed", e);
              isFading = false;
            });
          }
        }
        requestAnimationFrame(checkLoop);
      }
      requestAnimationFrame(checkLoop);
    }

    // Initialize synchronized instances
    setupSurgicalSync([
      [document.getElementById('hm1'), document.getElementById('hm2')]
    ], 0.5, 1500);

    setupSurgicalSync([
      [document.getElementById('magic-l1'), document.getElementById('magic-l2')],
      [document.getElementById('magic-r1'), document.getElementById('magic-r2')]
    ], 1.0, 4000);

    // =======================
    // SUBMIT ICONS PULSE (AO & OV)
    // =======================
    (function () {
      const pulseVids = [
        document.getElementById('ao-submit-pulse'),
        document.getElementById('ov-submit-pulse')
      ];

      let phase = 'out'; // Start by fading out from 0.8

      function animatePulse() {
        const transStr = `opacity 6s ease-in-out`;

        pulseVids.forEach(vid => {
          if (vid) {
            vid.addEventListener('mouseenter', () => pulseVids[1].style.opacity = '1');
            vid.addEventListener('mouseleave', () => pulseVids[1].style.opacity = '0.8');
          }
        });

        pulseVids.forEach(vid => {
          if (vid) {
            vid.style.transition = transStr;
            const targetOpacity = (phase === 'in') ? 0.8 : 0;
            vid.style.opacity = targetOpacity;
          }
        });

        setTimeout(() => {
          phase = (phase === 'in') ? 'out' : 'in';
          animatePulse();
        }, 6000);
      }

      // Initial state
      pulseVids.forEach(vid => {
        if (vid) vid.style.opacity = 0.8;
      });
      setTimeout(animatePulse, 100);
    })();

    // =======================
    // GREAT DISPERSAL LOGIC (TIMER & GLOW)
    // =======================
    (function () {
      function updateCountdown() {
        const targetDate = new Date('December 31, 2028 11:59:00').getTime();
        const now = new Date().getTime();
        const diff = targetDate - now;

        if (diff <= 0) {
          const el = document.getElementById('countdown-display');
          if (el) el.textContent = "00:00";
          return;
        }

        const totalMinutes = Math.floor(diff / (1000 * 60));
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;

        const display = `${hours.toLocaleString()}hr ${minutes.toString().padStart(2, '0')}min`;
        const el = document.getElementById('countdown-display');
        if (el) el.textContent = display;
      }
      setInterval(updateCountdown, 10000);
      updateCountdown();
    })();

    document.addEventListener("DOMContentLoaded", () => {
      const phrases = document.querySelectorAll('.special-phrase');
      phrases.forEach(el => {
        const text = el.getAttribute('data-text');
        if(text) {
          el.innerHTML = '';
          for (let i = 0; i < text.length; i++) {
            if (text[i] === ' ') {
              el.appendChild(document.createTextNode(' '));
            } else {
              const span = document.createElement('span');
              span.className = 'rbw-letter';
              span.textContent = text[i];
              span.style.setProperty('--hue', (i * 20));
              el.appendChild(span);
            }
          }
        }
      });
    });
  </script>
</body>

</html>
